<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Your Councillors</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <img src="../images/divest-for-palestine.jpeg" alt="Banner">
    </header>
    <main>
        <h1>Email the Pension Investments Committee chair</h1>
        <div class="explanation">
            <p>Use this tool to email the chair of the pension committee in the borough of Lewisham.
            Simply enter your name and click submit to generate an email to Councillor Sian Eiles.</p>
        </div>
        <form id="custom-form">
            <input type="text" id="fullName" placeholder="Enter your full name" required>
            <button type="submit">Generate Email</button>
        </form>
    </main>

    <!-- Modal structure -->
    <div id="resultModal">
        <div id="modalContent">
            <div id="loading" style="display: none;">
                <div class="spinner"></div>
                <div>Loading, please wait...</div>
            </div>
            <div id="result"></div>
            <button id="closeModal">Close</button>
        </div>
    </div>

    <script type="text/javascript">
        const picChairs = [
            { name: 'Sian Eiles', email: 'sian.eiles@lewisham.gov.uk', borough: 'Lewisham' },
        ];

        // Email template from body.docx
        const emailTemplate = `Dear Sian,

I am writing to you with urgency and profound disappointment regarding the Lewisham Pension Investment Committee’s (PIC) failure to implement the divestment motion passed by Lewisham Council in July 2025. This motion committed the council to divesting its Local Government Pension Scheme (LGPS) holdings from companies complicit in Israeli human rights abuses against Palestinians.

Time is running out. With the fund due to be pooled by 1 April 2026, the window to enact this democratic decision, in line with Lewisham’s stated values and legal obligations, is closing rapidly.

I understand there is currently talk of using a shorter UN list as a basis for divestment. This would maintain Lewisham's investment in companies such as Palantir - a company that has provided the Israeli military with advanced targeting capabilities allowing drone-fired missiles to target journalists, aid workers and civilians; Palantir also has a contract with the Israel Defence Ministry specifically for “population management” in the Occupied Palestinian Territories, facilitating a system of control and dehumanisation.

There is no need for debate or discussion about which lists to use or which companies to exclude. Your own fund manager, London CIV (LCIV), has explicitly stated that the United Nations Human Rights Office of the High Commissioner’s A/HRC/37/39 Report, the WhoProfits database, and the AFSC (Investigate) watchlist are “the most politically balanced and thorough sources of information that we can access.”

And regardless of the detail of lists, despite the PIC’s own recognition of companies involved in human rights abuses, not a single company has been excluded from Lewisham's investments.

The situation is clear:
    • The Council has democratically mandated divestment.
    • The PIC’s own investment manager has endorsed three specific sources for identifying problematic companies.
    • No legal barrier exists to divesting from companies involved in documented human rights violations; in fact, it is a core duty.
Your legacy as PIC Chair is now on the line. The residents of Lewisham are watching. We see the gap between the council’s motions and the committee's actions. We are aware that the pooling deadline of 1 April represents a point of no return for this divestment pledge.

Council elections are upcoming in May. To be clear, this is a voting issue for me. I urge you in the strongest possible terms: immediately instruct officers and the LCIV to begin the process of divesting from all companies identified by the combined criteria of the UN OHCHR A/HRC/37/39 Report, the WhoProfits database, and the AFSC Investigate watchlist. Any future pooling of funds into “pillars” should also use these three lists as criteria as to what companies to divest from. Anything else may lead to the farce of companies such a Palantir - actively facilitating genocide - being considered ethical investments.

Honour the council’s motion. Uphold international law. Fulfil your fiduciary duty. Agree to use all three lists. Act before the 1 April pooling deadline makes a mockery of Lewisham’s commitment to justice.
The time for delays, excuses, and capitulation is over. The time for action is now.

Yours sincerely,
{signee}`;

        function generateEmail(fullName) {
            const emailBody = emailTemplate.replace('{signee}', fullName);
            const encodedBody = encodeURIComponent(emailBody);
            const subject = encodeURIComponent('Cllr Sian Eiles- the time for action is now.');

            // Generate comma-separated list of all recipients
            const recipients = picChairs.map(chair => chair.email).join(',');

            return `mailto:${recipients}?bcc=info@lewishampsc.org&subject=${subject}&body=${encodedBody}`;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        jQuery(document).ready(function($) {
            $('#custom-form').on('submit', function(event) {
                event.preventDefault();

                const fullName = $('#fullName').val().trim();
                const mailtoUrl = generateEmail(fullName);
                const emailBody = emailTemplate.replace('{signee}', fullName);

                let html = '<h2>Email Generated Successfully</h2>';

                html += '<ul style="list-style-type: none;">';
                picChairs.forEach(chair => {
                    html += `<li><strong>${chair.name}</strong> - ${chair.borough}</li>`;
                });
                html += '</ul>';

                html += '<p>Click the button below to open your email client with a pre-filled message:</p>';
                html += `<a id="openEmailLink" href="${mailtoUrl}">
                    Open email to Councillor Sian Eiles
                </a>`;

                // Fallback section
                html += `<div class="fallback-section">
                    <h2>Email not opening correctly?</h2>
                    <p>If the button above doesn't work, you can manually copy the email content:</p>
                    <button class="copy-email-btn" id="copyEmailBtn" data-email="${escapeHtml(emailBody)}">
                        Copy Email Text
                    </button>
                    <p style="margin-top: 10px;">Then manually create an email to: ${picChairs.map(c => c.email).join(', ')}</p>
                    <p>Subject: Cllr Sian Eiles- the time for action is now.</p>
                </div>`;

                $('#result').html(html);
                $('#resultModal').css('display', 'flex');
            });

            // Copy email to clipboard functionality
            $(document).on('click', '.copy-email-btn', function() {
                const emailText = $(this).data('email');

                navigator.clipboard.writeText(emailText)
                    .then(() => {
                        const $btn = $(this);
                        const originalText = $btn.text();
                        $btn.text('Copied! ✓');
                        setTimeout(() => $btn.text(originalText), 2000);
                    })
                    .catch(err => {
                        alert('Could not copy email text: ' + err);
                    });
            });

            // Close modal button
            $('#closeModal').on('click', function() {
                $('#resultModal').css('display', 'none');
            });
        });
    </script>
</body>
</html>
